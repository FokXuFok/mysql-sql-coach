# .github/workflows/build-gui.yml
# 三平台并行构建 SQL Coach GUI 桌面版 (onedir 模式)
name: Build GUI

on:
  push:
    tags:
      - 'v*'  # 仅在打 v* 标签时触发
  workflow_dispatch:  # 手动触发

permissions:
  contents: write  # softprops/action-gh-release 需要写权限更新 Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset_name: sql-coach-gui-windows.zip
          - os: macos-latest
            asset_name: sql-coach-gui-macos.tar.gz
          - os: ubuntu-latest
            asset_name: sql-coach-gui-linux.tar.gz

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[gui]"
          pip install pyinstaller

      - name: Setup Linux display libraries
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libxcb-xinerama0 libxkbcommon-x11-0 libegl1 libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0

      - name: Build with PyInstaller (onedir)
        run: pyinstaller sql-coach.spec --clean --noconfirm

      - name: Package (Windows zip)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path dist/sql-coach-gui -DestinationPath dist/sql-coach-gui-windows.zip

      - name: Package (macOS tar.gz)
        if: matrix.os == 'macos-latest'
        run: |
          cd dist
          tar -czvf sql-coach-gui-macos.tar.gz sql-coach-gui

      - name: Package (Linux tar.gz)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd dist
          tar -czvf sql-coach-gui-linux.tar.gz sql-coach-gui

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: dist/${{ matrix.asset_name }}

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
