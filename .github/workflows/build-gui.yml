# .github/workflows/build-gui.yml
# 三平台并行构建 SQL Coach GUI 桌面版
name: Build GUI

on:
  push:
    tags:
      - 'v*'  # 仅在打 v* 标签时触发
  workflow_dispatch:  # 手动触发

permissions:
  contents: write  # softprops/action-gh-release 需要写权限更新 Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: sql-coach-gui
            asset_extension: .exe
          - os: macos-latest
            artifact_name: sql-coach-gui
            asset_extension: .tar.gz
          - os: ubuntu-latest
            artifact_name: sql-coach-gui
            asset_extension: .tar.gz

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[gui]"
          pip install pyinstaller

      - name: Setup Linux display libraries
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libxcb-xinerama0 libxkbcommon-x11-0 libegl1 libxcb-cursor0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0

      - name: Build with PyInstaller
        run: pyinstaller sql-coach.spec --clean --noconfirm

      - name: Package artifact (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-windows
          path: dist/sql-coach-gui.exe

      - name: Package artifact (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          # onefile 模式生成可执行文件, 打包为 tar.gz
          cd dist
          tar -czvf sql-coach-gui.tar.gz sql-coach-gui

      - name: Upload artifact (macOS)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-macos
          path: dist/sql-coach-gui.tar.gz

      - name: Package artifact (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cd dist
          tar -czvf sql-coach-gui.tar.gz sql-coach-gui

      - name: Upload artifact (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-linux
          path: dist/sql-coach-gui.tar.gz

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/sql-coach-gui${{ matrix.asset_extension }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
